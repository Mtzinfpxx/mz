<!DOCTYPE html>

<title>Professores | Anglo Mirante</title>
<link rel="stylesheet" href="dashboard.css">

</head>

<body>
<div class="dashboard">
    <aside class="sidebar">
        <a class="logo" href="index.html" aria-label="Ir para a página inicial">
            <img src="assets/logo.jpg" alt="Anglo Mirante">
            <div>
                <h2>ANGLO</h2>
                <span>MIRANTE</span>
            </div>
        </a>

        <nav aria-label="Menu principal">
            <a href="dashboard.html">Dashboard</a>
            <a href="alunos.html">Alunos</a>
            <a href="cursos.html">Cursos</a>

        <header class="topbar">
            <div>
                <h1>Professores</h1>

                <p>Matemática</p>

                <span class="badge success">Avaliação 4.8</span>
            </article>

            <article class="card">
                <h2>Ricardo Gomes</h2>
                <p>Física</p>
                <span class="badge success">Avaliação 5.0</span>
