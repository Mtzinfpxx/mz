<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MZ Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>
  <div class="glow"></div>

  <nav class="navbar">
    <div class="logo">MZ<span>.</span></div>

    <div class="nav-links">
      <a href="#">Início</a>
      <a href="#">Recursos</a>
      <a href="#">Dashboard</a>
      <a href="#">Contato</a>
    </div>
  </nav>

  <main class="hero">
    <div class="hero-content">

      <div class="badge">
        🚀 Plataforma Profissional
      </div>

      <h1>
        Gerencie seus projetos
        com velocidade e elegância
      </h1>

      <p>
        Uma plataforma moderna para controle, monitoramento
        e gerenciamento de recursos com performance,
        segurança e design premium.
      </p>

      <div class="hero-buttons">
        <button class="btn-primary">
          Começar Agora
        </button>

        <button class="btn-secondary">
          Saiba Mais
        </button>
      </div>

    </div>
  </main>

</body>
</html>
